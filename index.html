<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Página Oficial</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #111, #222);
      color: white;
      text-align: center;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      width: 90%;
      max-width: 420px;
      background: #1c1c1c;
      padding: 30px;
      border-radius: 18px;
      box-shadow: 0 0 25px rgba(0, 0, 0, 0.5);
    }

    h1 {
      font-size: 28px;
      margin-bottom: 10px;
    }

    p {
      color: #ccc;
      line-height: 1.5;
    }

    .botao {
      display: block;
      background: #007bff;
      color: white;
      padding: 16px;
      margin-top: 20px;
      border-radius: 12px;
      text-decoration: none;
      font-size: 18px;
      font-weight: bold;
    }

    .aviso {
      font-size: 13px;
      color: #999;
      margin-top: 20px;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Página Oficial</h1>

    <p>
      Este é um link de acesso temporário.
      Nenhum dado pessoal é exibido nesta página.
    </p>

    <div class="botao">
      Continuar
    </div>

    <p class="aviso">
      Página hospedada via GitHub Pages.
    </p>
  </div>
</body>
</html>
