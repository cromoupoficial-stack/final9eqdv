<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Realidade Aumentada</title>

  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: #000;
      font-family: Arial, sans-serif;
    }

    .aviso {
      position: fixed;
      top: 15px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 9999;
      background: rgba(0, 0, 0, 0.75);
      color: white;
      padding: 12px 18px;
      border-radius: 10px;
      text-align: center;
      font-size: 15px;
      max-width: 90%;
    }
  </style>
</head>

<body>
  <div class="aviso">
    Permita a câmera e aponte para o marcador.
  </div>

  <a-scene
    embedded
    arjs="sourceType: webcam; debugUIEnabled: false;"
    vr-mode-ui="enabled: false"
  >

    <a-marker
      type="pattern"
      url="pattern-marker.patt"
    >

      <a-box
        position="0 0.5 0"
        rotation="0 45 0"
        color="blue"
        depth="1"
        height="1"
        width="1"
        animation="property: rotation; to: 0 405 0; loop: true; dur: 3000">
      </a-box>

      <a-text
        value="AR Ativado"
        position="-1 1.5 0"
        rotation="-90 0 0"
        color="white"
        width="3"
        align="center">
      </a-text>

    </a-marker>

    <a-entity camera></a-entity>
  </a-scene>
</body>
</html>
